<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stella Indoor — Launch Poster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #0b0f19;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
    }
    #poster {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 70px;
    }
    .bg {
      position: absolute;
      inset: 0;
      background: url('stella-indoor-source/public/court-big.jpg') center/cover no-repeat;
      z-index: 0;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(11,15,25,0.55) 0%, rgba(11,15,25,0.82) 60%, rgba(11,15,25,0.92) 100%);
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 2;
      width: 100%;
    }
    .logo {
      width: 180px;
      height: 180px;
      object-fit: contain;
      margin-bottom: 30px;
      filter: drop-shadow(0 16px 50px rgba(0,0,0,0.5));
    }
    h1 {
      font-size: 96px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -2px;
      text-shadow: 0 12px 60px rgba(0,0,0,0.6);
      margin-bottom: 30px;
    }
    h2 {
      font-size: 58px;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 28px;
      text-shadow: 0 8px 40px rgba(0,0,0,0.55);
    }
    p {
      font-size: 40px;
      font-weight: 400;
      line-height: 1.4;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
      margin-bottom: 46px;
      opacity: 0.95;
    }
    .badge {
      display: inline-block;
      background: #ff3e6c;
      color: #fff;
      font-weight: 900;
      font-size: 34px;
      padding: 20px 48px;
      border-radius: 999px;
      box-shadow: 0 14px 50px rgba(255,62,108,0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 54px;
    }
    .url {
      font-size: 42px;
      font-weight: 700;
      color: #00e5ff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .grid {
      display: flex;
      gap: 28px;
      justify-content: center;
      margin-top: 60px;
    }
    .grid img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.55);
    }
  </style>
</head>
<body>
  <div id="poster">
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="content">
      <img class="logo" src="stella-indoor-source/public/logo-stella.png" alt="Stella Indoor" />
      <h1>Stella Indoor</h1>
      <h2>Book your court in seconds</h2>
      <p>Indoor sports booking made simple.<br/>Choose your court, pick a time, and play.</p>
      <div class="badge">Launches 1 August 2026</div>
      <div class="url">stella-indoor.web.app</div>
      <div class="grid">
        <img src="stella-indoor-source/public/addon-soccer.jpg" alt="Soccer ball" />
        <img src="stella-indoor-source/public/addon-bibs.jpg" alt="Bibs" />
      </div>
    </div>
  </div>
</body>
</html>
