# Stella Indoor Sports Hub - Netlify Configuration

[build]
  publish = "."
  functions = "netlify/functions"

# Admin dashboard - serve admin.html
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Force fresh HTML on every load
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Long-term cache for JS/CSS assets (hashed filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
